# Build with Vite and deploy static output to GitHub Pages.
# Repo settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Vite bakes these at build time. Use repository *secrets* (preferred for the
          # password) or *variables* — both are supported; secrets take precedence.
          VITE_ADMIN_AUTH_KEY: ${{ secrets.VITE_ADMIN_AUTH_KEY || vars.VITE_ADMIN_AUTH_KEY }}
          VITE_ADMIN_PASS_KEY: ${{ secrets.VITE_ADMIN_PASS_KEY || vars.VITE_ADMIN_PASS_KEY }}
          VITE_ADMIN_DEFAULT_PASS: ${{ secrets.VITE_ADMIN_DEFAULT_PASS || vars.VITE_ADMIN_DEFAULT_PASS }}
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
